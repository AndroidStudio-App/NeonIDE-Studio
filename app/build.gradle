plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

ext {
    packageVariant = System.getenv('TERMUX_PACKAGE_VARIANT') ?: 'apt-android-7'
    bootstrapMinSdk = packageVariant == 'apt-android-5' ? 21 : 24
    bootstrapMinRelease = packageVariant == 'apt-android-5' ? '5.0' : '7.0'
    bootstrapMaxSdk = packageVariant == 'apt-android-5' ? 23 : null
    bootstrapMaxRelease = packageVariant == 'apt-android-5' ? '6.0' : null

    buildMinSdk = bootstrapMinSdk
    buildTargetSdk = project.properties.targetSdkVersion.toInteger()
}

configurations.all {
    exclude group: 'com.google.guava', module: 'listenablefuture'
}

def sha256Of = { File f ->
    def digest = java.security.MessageDigest.getInstance('SHA-256')
    f.withInputStream { is ->
        def buffer = new byte[8192]
        int read
        while ((read = is.read(buffer)) > 0) {
            digest.update(buffer, 0, read)
        }
    }
    def checksum = new BigInteger(1, digest.digest()).toString(16)
    while (checksum.length() < 64) { checksum = '0' + checksum }
    return checksum
}

def bootstrapZipFile = file("$projectDir/src/main/cpp/bootstrap-aarch64.zip")
def bootstrapStampFile = file("$projectDir/src/main/cpp/generated/bootstrap-stamp.S")
def bootstrapZipSha256 = bootstrapZipFile.exists() ? sha256Of(bootstrapZipFile) : 'missing'
def bootstrapZipSize = bootstrapZipFile.exists() ? bootstrapZipFile.length() : -1L

/**
 * Generate app/src/main/cpp/bootstrap-stamp.S from the current bootstrap zip.
 * termux-bootstrap-zip.S includes this file so changing the zip forces recompilation.
 */
tasks.register('generateBootstrapStamp') {
    dependsOn tasks.named('downloadBootstrapZip')
    
    // Don't declare bootstrapZipFile as input - it's produced by downloadBootstrapZip
    // We only declare the stamp file as output
    outputs.file(bootstrapStampFile)
    doLast {
        def sha = bootstrapZipFile.exists() ? sha256Of(bootstrapZipFile) : 'missing'
        def size = bootstrapZipFile.exists() ? bootstrapZipFile.length() : -1L
        bootstrapStampFile.parentFile.mkdirs()
        bootstrapStampFile.text = "" +
            "// Generated by Gradle. Do not edit.\n" +
            "// Source: bootstrap-aarch64.zip\n" +
            "// size: ${size} bytes\n" +
            "// sha256: ${sha}\n\n" +
            "    .ascii \"BOOTSTRAP_SHA256=${sha}\\n\"\n" +
            "    .ascii \"BOOTSTRAP_SIZE=${size}\\n\"\n"
    }
}

android {
    namespace 'com.neonide.studio'
    compileSdkVersion project.properties.compileSdkVersion.toInteger()
    ndkVersion = System.getenv('JITPACK_NDK_VERSION') ?: project.properties.ndkVersion

    def appVersionName = System.getenv('TERMUX_APP_VERSION_NAME') ?: ''
    def apkVersionTag = System.getenv('TERMUX_APK_VERSION_TAG') ?: ''
    def splitAPKsForDebugBuilds = System.getenv('TERMUX_SPLIT_APKS_FOR_DEBUG_BUILDS') ?: '1'
    def splitAPKsForReleaseBuilds = System.getenv('TERMUX_SPLIT_APKS_FOR_RELEASE_BUILDS') ?: '0'

    defaultConfig {
        applicationId 'com.neonide.studio'
        minSdk project.ext.buildMinSdk
        targetSdk project.ext.buildTargetSdk
        versionCode 1022
        versionName '0.119.0-beta.3'

        if (appVersionName) versionName = appVersionName
        validateVersionName(versionName)

        buildConfigField 'Integer', 'TERMUX_APP__BOOTSTRAP_MIN_SDK', project.ext.bootstrapMinSdk.toString()
        buildConfigField 'String', 'TERMUX_APP__BOOTSTRAP_MIN_RELEASE',
            project.ext.bootstrapMinRelease ? '"' + project.ext.bootstrapMinRelease + '"' : 'null'
        buildConfigField 'Integer', 'TERMUX_APP__BOOTSTRAP_MAX_SDK', project.ext.bootstrapMaxSdk.toString()
        buildConfigField 'String', 'TERMUX_APP__BOOTSTRAP_MAX_RELEASE',
            project.ext.bootstrapMaxRelease ? '"' + project.ext.bootstrapMaxRelease + '"' : 'null'
        buildConfigField 'String', 'TERMUX_PACKAGE_VARIANT', '"' + project.ext.packageVariant + '"'

        // These are used to detect embedded bootstrap changes at runtime.
        // NOTE: Changing the zip should also rebuild JNI; see afterEvaluate() below.
        buildConfigField 'String', 'TERMUX_APP__BOOTSTRAP_SHA256', '"' + bootstrapZipSha256 + '"'
        buildConfigField 'long', 'TERMUX_APP__BOOTSTRAP_SIZE', bootstrapZipSize.toString() + 'L'

        manifestPlaceholders.TERMUX_PACKAGE_NAME = 'com.neonide.studio'
        manifestPlaceholders.TERMUX_APP_NAME = 'NeonIDE Studio'
        manifestPlaceholders.TERMUX_API_APP_NAME = 'NeonIDE Studio:API'
        manifestPlaceholders.TERMUX_BOOT_APP_NAME = 'NeonIDE Studio:Boot'
        manifestPlaceholders.TERMUX_FLOAT_APP_NAME = 'NeonIDE Studio:Float'
        manifestPlaceholders.TERMUX_STYLING_APP_NAME = 'NeonIDE Studio:Styling'
        manifestPlaceholders.TERMUX_TASKER_APP_NAME = 'NeonIDE Studio:Tasker'
        manifestPlaceholders.TERMUX_WIDGET_APP_NAME = 'NeonIDE Studio:Widget'

        // This fork targets arm64 devices only (aarch64 bootstrap).
        // Keeping only one ABI significantly reduces build output size and avoids packaging
        // bootstraps for other architectures.
        splits {
            abi {
                enable true
                reset()
                include 'arm64-v8a'
                universalApk false
            }
        }

    }


    buildFeatures {
        buildConfig true
        viewBinding true
    }

    signingConfigs {
        debug {
            storeFile file('testkey_untrusted.jks')
            keyAlias 'alias'
            storePassword 'xrj45yWGLbsO7W0v'
            keyPassword 'xrj45yWGLbsO7W0v'
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        // Required for libraries that ship Java 17 bytecode (e.g. sora-editor)
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    externalNativeBuild {
        ndkBuild {
            path 'src/main/cpp/Android.mk'
        }
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lint {
        disable += ['ProtectedPermissions']
    }

    testOptions {
        unitTests.includeAndroidResources = true
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            if (variant.buildType.name == 'debug') {
                def abi = output.getFilter(com.android.build.OutputFile.ABI)
                outputFileName = new File('termux-app_' + (apkVersionTag ? apkVersionTag : project.ext.packageVariant + '-debug') + '_' + (abi ? abi : 'universal') + '.apk')
            } else if (variant.buildType.name == 'release') {
                def abi = output.getFilter(com.android.build.OutputFile.ABI)
                outputFileName = new File('termux-app_' + (apkVersionTag ? apkVersionTag : project.ext.packageVariant + '-release') + '_' + (abi ? abi : 'universal') + '.apk')
            }
        }
    }
}

