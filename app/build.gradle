tasks.register('setupOniguruma') {
    def onigDir = new File(projectDir, 'src/main/cpp/oniguruma/oniguruma')
    def onigZip = new File(buildDir, 'oniguruma.zip')
    def zipRoot = 'oniguruma-6.9.10'

    // Setup config.h for Android NDK build
    def configFile = new File(onigDir, 'src/config.h')

    outputs.dir onigDir
    outputs.file configFile

    doLast {
        if (!onigDir.exists() || !new File(onigDir, 'src/oniguruma.h').exists()) {
            logger.quiet("Downloading and extracting Oniguruma...")
            onigZip.parentFile.mkdirs()
            new URL('https://github.com/kkos/oniguruma/archive/refs/tags/v6.9.10.zip').withInputStream { i ->
                onigZip.withOutputStream { it << i }
            }
            project.copy {
                from zipTree(onigZip)
                into onigDir.parentFile
            }

            def extractedDir = new File(onigDir.parentFile, zipRoot)
            if (extractedDir.exists()) {
                if (onigDir.exists()) onigDir.deleteDir()
                extractedDir.renameTo(onigDir)
            }

            onigZip.delete()
        }
        
        if (!configFile.exists())
        logger.quiet("Generating config.h for Android NDK...")
        configFile.parentFile.mkdirs()
        configFile.text = """/* config.h for Android NDK build (arm64-v8a) */
#ifndef CONFIG_H
#define CONFIG_H

#define HAVE_ALLOCA 1
#define HAVE_ALLOCA_H 1
#define HAVE_STDINT_H 1
#define HAVE_SYS_TIME_H 1
#define HAVE_SYS_TYPES_H 1
#define HAVE_UNISTD_H 1
#define HAVE_INTTYPES_H 1
#define SIZEOF_INT 4
#define SIZEOF_LONG 8
#define SIZEOF_LONG_LONG 8
#define SIZEOF_VOIDP 8

/* Disable features not needed on Android */
#undef USE_CRNL_AS_LINE_TERMINATOR
#undef CRAY_STACKSEG_END
#undef C_ALLOCA

#endif /* CONFIG_H */
"""
        
    }
}

tasks.register('downloadBootstrapZip'){
    def bootstrapUrl = 'https://github.com/AndroidStudio-App/AndroidStudio-App/releases/download/bootstarprap/bootstrap-aarch64.zip'
    def cppDir = new File(projectDir, 'src/main/cpp')
    def bootstrapZip = new File(cppDir, 'bootstrap-aarch64.zip')

    inputs.property('bootstrapUrl', bootstrapUrl)
    outputs.file(bootstrapZip)

    doLast {
        if (!bootstrapZip.exists()) {
            logger.quiet("Downloading bootstrap from $bootstrapUrl ...")
            cppDir.mkdirs()
            new URL(bootstrapUrl).withInputStream { i ->
                bootstrapZip.withOutputStream { it << i }
            }
        } 
    }
}

tasks.register('generateBootstrapStamp') {
    outputs.file(bootstrapStampFile)
    doLast {
        def sha = bootstrapZipFile.exists() ? sha256Of(bootstrapZipFile) : 'make sure task are below downloadBootstrap'
        def size = bootstrapZipFile.exists() ? bootstrapZipFile.length() : -1L
        bootstrapStampFile.parentFile.mkdirs()
        bootstrapStampFile.text = "" +
            ".ascii \"BOOTSTRAP_SHA256=${sha}\\n\"\n" +
            ".ascii \"BOOTSTRAP_SIZE=${size}\\n\"\n"
    }
}

tasks.register('generateDebugKeystore') {
    def keystoreFile = file("$projectDir/testkey_untrusted.jks")
    outputs.file(keystoreFile)
    doLast {
        if (!keystoreFile.exists()) {
            logger.quiet("Generating debug keystore...")
            keystoreFile.parentFile.mkdirs()
            def keytoolCmd = [
                'keytool',
                '-genkey',
                '-v',
                '-keystore', keystoreFile.absolutePath,
                '-alias', 'alias',
                '-keyalg', 'RSA',
                '-keysize', '2048',
                '-validity', '10000',
                '-storepass', 'xrj45yWGLbsO7W0v',
                '-keypass', 'xrj45yWGLbsO7W0v',
                '-dname', 'CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=Debug'
            ]
            def process = keytoolCmd.execute()
            process.waitFor()
            }
        }
}
// Rebuild bootstrap ndk build when there's changes 
tasks.register('cleanNativeIfBootstrapChanged') {
    dependsOn tasks.named('generateBootstrapStamp')
    def stateFile = file("$buildDir/bootstrap-embedded.sha256")
    outputs.file(stateFile)
    doLast {
        def currentSha = bootstrapZipFile.exists() ? sha256Of(bootstrapZipFile) : null
        def previousSha = stateFile.exists() ? stateFile.text.trim() : null
        if (previousSha == null || previousSha != currentSha) {
            logger.lifecycle("Bootstrap zip changed (old=${previousSha}, new=${currentSha}). Cleaning native intermediates...")
            delete(
                file("$buildDir/intermediates/ndkBuild"),
                file("$buildDir/intermediates/cxx"),
                file("$buildDir/intermediates/merged_native_libs"),
                file("$buildDir/intermediates/stripped_native_libs")
            )
        }
        stateFile.parentFile.mkdirs()
        stateFile.text = currentSha + "\n"
    }
}

preBuild.dependsOn tasks.named('setupOniguruma')
preBuild.dependsOn tasks.named('downloadBootstrapZip')
preBuild.dependsOn tasks.named('generateBootstrapStamp')
preBuild.dependsOn tasks.named('generateDebugKeystore')
preBuild.dependsOn tasks.named('cleanNativeIfBootstrapChanged')
