// NOTE: We keep bootstrap-*.zip files locally (ignored by git) and do not download them during builds.
// Do not delete them on `clean`.

/**
 * Ensures Termux bootstrap archives exist locally and copies them into assets for runtime use.
 *
 * Expected local location:
 *   app/src/main/cpp/bootstrap-<arch>.zip
 * Copied to:
 *   app/src/main/assets/bootstrap/bootstrap-<arch>.zip
 */
task prepareBootstraps() {
    doLast {
        // IMPORTANT: Do not package bootstrap zips in app assets.
        // This project embeds the bootstrap into libtermux-bootstrap.so (JNI) for runtime use.
        // Copying bootstraps into assets can dramatically inflate APK size.
        logger.quiet("prepareBootstraps: skipped (bootstrap is embedded in JNI)")
    }
}

task setupOniguruma {
    def onigDir = new File(projectDir, 'src/main/cpp/oniguruma/oniguruma')
    def onigZip = new File(buildDir, 'oniguruma.zip')
    def zipRoot = 'oniguruma-6.9.10'

    // Setup config.h for Android NDK build
    def configFile = new File(onigDir, 'src/config.h')

    outputs.dir onigDir
    outputs.file configFile

    doLast {
        if (!onigDir.exists() || !new File(onigDir, 'src/oniguruma.h').exists()) {
            logger.quiet("Downloading Oniguruma...")
            onigZip.parentFile.mkdirs()
            new URL('https://github.com/kkos/oniguruma/archive/refs/tags/v6.9.10.zip').withInputStream { i ->
                onigZip.withOutputStream { it << i }
            }

            logger.quiet("Extracting Oniguruma...")
            project.copy {
                from zipTree(onigZip)
                into onigDir.parentFile
            }

            def extractedDir = new File(onigDir.parentFile, zipRoot)
            if (extractedDir.exists()) {
                if (onigDir.exists()) onigDir.deleteDir()
                extractedDir.renameTo(onigDir)
            }

            onigZip.delete()
        }

        // Always generate config.h for Android NDK (even if directory already exists)
        logger.quiet("Generating config.h for Android NDK...")
        configFile.parentFile.mkdirs()
        configFile.text = """/* config.h for Android NDK build (arm64-v8a) */
#ifndef CONFIG_H
#define CONFIG_H

#define HAVE_ALLOCA 1
#define HAVE_ALLOCA_H 1
#define HAVE_STDINT_H 1
#define HAVE_SYS_TIME_H 1
#define HAVE_SYS_TYPES_H 1
#define HAVE_UNISTD_H 1
#define HAVE_INTTYPES_H 1
#define SIZEOF_INT 4
#define SIZEOF_LONG 8
#define SIZEOF_LONG_LONG 8
#define SIZEOF_VOIDP 8

/* Disable features not needed on Android */
#undef USE_CRNL_AS_LINE_TERMINATOR
#undef CRAY_STACKSEG_END
#undef C_ALLOCA

#endif /* CONFIG_H */
"""
    }
}

task downloadBootstrapZip {
    def bootstrapUrl = 'https://github.com/AndroidStudio-App/AndroidStudio-App/releases/download/bootstarprap/bootstrap-aarch64.zip'
    def cppDir = new File(projectDir, 'src/main/cpp')
    def bootstrapZip = new File(cppDir, 'bootstrap-aarch64.zip')

    inputs.property('bootstrapUrl', bootstrapUrl)
    outputs.file(bootstrapZip)

    doLast {
        if (!bootstrapZip.exists()) {
            logger.quiet("Downloading bootstrap from $bootstrapUrl ...")
            cppDir.mkdirs()
            new URL(bootstrapUrl).withInputStream { i ->
                bootstrapZip.withOutputStream { it << i }
            }
            logger.quiet("Bootstrap downloaded to ${bootstrapZip.absolutePath}")
        } else {
            logger.quiet("Bootstrap already exists at ${bootstrapZip.absolutePath}, skipping download")
        }
    }
}

preBuild.dependsOn setupOniguruma
preBuild.dependsOn tasks.named('downloadBootstrapZip')
preBuild.dependsOn tasks.named('generateBootstrapStamp')
/**
 * If the bootstrap zip changes, we must force a rebuild of ndk-build outputs.
 * Some build setups can still reuse stale objects even when inputs change.
 * This task makes the rebuild reliable without requiring manual rm -rf.
 */
tasks.register('cleanNativeIfBootstrapChanged') {
    dependsOn tasks.named('generateBootstrapStamp')

    def stateFile = file("$buildDir/bootstrap-embedded.sha256")
    // Don't declare bootstrapZipFile as input - it's produced by downloadBootstrapZip
    outputs.file(stateFile)

    doLast {
        def currentSha = bootstrapZipFile.exists() ? sha256Of(bootstrapZipFile) : 'missing'
        def previousSha = stateFile.exists() ? stateFile.text.trim() : null

        if (previousSha == null || previousSha != currentSha) {
            logger.lifecycle("Bootstrap zip changed (old=${previousSha}, new=${currentSha}). Cleaning native intermediates...")
            delete(
                file("$buildDir/intermediates/ndkBuild"),
                file("$buildDir/intermediates/cxx"),
                file("$buildDir/intermediates/merged_native_libs"),
                file("$buildDir/intermediates/stripped_native_libs")
            )
        }

        stateFile.parentFile.mkdirs()
        stateFile.text = currentSha + "\n"
    }
}

preBuild.dependsOn tasks.named('cleanNativeIfBootstrapChanged')

afterEvaluate {
    android.applicationVariants.all { variant ->
        variant.javaCompileProvider.get().dependsOn(prepareBootstraps)
    }

    // Make sure externalNativeBuild tasks re-run when bootstrap zip changes.
    // Without this, Gradle may consider the native build up-to-date even though
    // termux-bootstrap-zip.S uses `.incbin`.
    def zip = file("$projectDir/src/main/cpp/bootstrap-aarch64.zip")
    def stamp = file("$projectDir/src/main/cpp/generated/bootstrap-stamp.S")

    tasks.matching { it.name.startsWith('externalNativeBuild') || it.name.startsWith('configureNdkBuild') || it.name.startsWith('buildNdkBuild') }.configureEach {
        dependsOn tasks.named('generateBootstrapStamp')
        // Don't declare zip as input - it's produced by downloadBootstrapZip
        inputs.file(stamp)
    }

    // If the APK becomes smaller between builds (e.g., bootstrap shrinks), some packaging flows
    // can leave trailing bytes in the existing output file, making the APK file-size look huge
    // even though its zip contents are smaller. Deleting the output before packaging avoids that.
    tasks.matching { it.name == 'packageDebug' || it.name == 'packageRelease' }.configureEach {
        doFirst {
            outputs.files.files.each { f ->
                if (f != null && f.exists() && f.isFile()) {
                    logger.lifecycle("Deleting stale APK output before packaging: ${f}")
                    //noinspection ResultOfMethodCallIgnored
                    f.delete()
                }
            }
        }
    }
}

def validateVersionName(String versionName) {
    if (!java.util.regex.Pattern.matches('^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-((?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\\.(?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\\+([0-9a-zA-Z-]+(?:\\.[0-9a-zA-Z-]+)*))?$', versionName)) {
        throw new GradleException('The versionName "' + versionName + '" is not valid per semantic versioning spec.')
    }
}

def downloadBootstrap(String arch, String expectedChecksum, String version) {
    def digest = java.security.MessageDigest.getInstance('SHA-256')
    def localUrl = 'src/main/cpp/bootstrap-' + arch + '.zip'
    def file = new File(projectDir, localUrl)
    if (file.exists()) {
        def buffer = new byte[8192]
        def input = new FileInputStream(file)
        while (true) {
            def readBytes = input.read(buffer)
            if (readBytes < 0) break
            digest.update(buffer, 0, readBytes)
        }
        def checksum = new BigInteger(1, digest.digest()).toString(16)
        while (checksum.length() < 64) { checksum = '0' + checksum }
        if (checksum == expectedChecksum) return
        logger.quiet('Deleting old local file with wrong hash: ' + localUrl + ': expected: ' + expectedChecksum + ', actual: ' + checksum)
        file.delete()
    }

    def remoteUrl = 'https://github.com/termux/termux-packages/releases/download/bootstrap-' + version + '/bootstrap-' + arch + '.zip'
    logger.quiet('Downloading ' + remoteUrl + ' ...')

    file.parentFile.mkdirs()
    def out = new BufferedOutputStream(new FileOutputStream(file))

    def connection = new URL(remoteUrl).openConnection()
    connection.setInstanceFollowRedirects(true)
    def digestStream = new java.security.DigestInputStream(connection.inputStream, digest)
    out << digestStream
    out.close()

    def checksum = new BigInteger(1, digest.digest()).toString(16)
    while (checksum.length() < 64) { checksum = '0' + checksum }
    if (checksum != expectedChecksum) {
        file.delete()
        throw new GradleException('Wrong checksum for ' + remoteUrl + ': expected: ' + expectedChecksum + ', actual: ' + checksum)
    }
}
