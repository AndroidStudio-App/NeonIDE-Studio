    externalNativeBuild {
        ndkBuild {
            path 'src/main/cpp/Android.mk'
        }
    }

    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += [
            '-Xjvm-default=all'
        ]
    }

    composeOptions {
    }

    lint {
        disable += ['ProtectedPermissions']
    }

    testOptions {
        unitTests.includeAndroidResources = true
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
}

